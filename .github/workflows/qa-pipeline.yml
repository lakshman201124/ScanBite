name: ScanBite QA Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  TEST_ADMIN_EMAIL: admin@spicegarden.com
  TEST_ADMIN_PASSWORD: admin123
  TEST_CHEF_SLUG: spice-garden
  TEST_CHEF_PIN: "1234"
  TEST_OTP_BYPASS: "true"
  NODE_VERSION: "20"

# ─── Setup: node via actions/setup-node, pnpm via npm install -g ───────────────

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 0 — Static Analysis (TypeScript + ESLint)
  # ════════════════════════════════════════════════════════════════════════════
  static-analysis:
    name: "Static Analysis (TS + ESLint)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        working-directory: qrdine
        run: pnpm type-check

      - name: ESLint
        working-directory: qrdine
        run: pnpm lint

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Auth Tests  (gates all browser jobs)
  # ════════════════════════════════════════════════════════════════════════════
  auth-tests:
    name: "Auth Tests (UI + API)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: static-analysis
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run auth tests
        working-directory: qrdine
        run: npx playwright test --project=auth-tests --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-auth
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — API Tests
  # ════════════════════════════════════════════════════════════════════════════
  api-tests:
    name: "API Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: auth-tests
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        working-directory: qrdine
        run: npx playwright test --project=api-tests --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-api
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Security Tests
  # ════════════════════════════════════════════════════════════════════════════
  security-tests:
    name: "Security Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: auth-tests
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run security tests
        working-directory: qrdine
        run: npx playwright test --project=security-tests --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-security
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — Admin UI Tests
  # ════════════════════════════════════════════════════════════════════════════
  admin-ui:
    name: "Admin UI (Desktop)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [api-tests, security-tests]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run admin UI tests
        working-directory: qrdine
        run: npx playwright test --project=admin-desktop --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-admin-ui
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5 — Customer Mobile Tests
  # ════════════════════════════════════════════════════════════════════════════
  customer-mobile:
    name: "Customer Mobile (Pixel 7)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [api-tests, security-tests]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run customer mobile tests
        working-directory: qrdine
        run: npx playwright test --project=customer-mobile --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-customer-mobile
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 6 — Chef / KDS Tests
  # ════════════════════════════════════════════════════════════════════════════
  chef-kds:
    name: "Chef / KDS (iPad Pro)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [api-tests, security-tests]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run chef / KDS tests
        working-directory: qrdine
        run: npx playwright test --project=chef-tablet --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-chef-kds
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 7 — Edge Cases
  # ════════════════════════════════════════════════════════════════════════════
  edge-cases:
    name: "Edge Cases & Regression"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [api-tests, security-tests]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run edge case tests
        working-directory: qrdine
        run: npx playwright test --project=edge-cases --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-edge-cases
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 8 — Design Compliance
  # ════════════════════════════════════════════════════════════════════════════
  design-compliance:
    name: "Design Compliance Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [admin-ui, customer-mobile]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run design compliance tests
        working-directory: qrdine
        run: npx playwright test --project=design-compliance --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-design-compliance
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 9 — Real-time Socket Tests
  # ════════════════════════════════════════════════════════════════════════════
  realtime-tests:
    name: "Real-time Socket Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [admin-ui, customer-mobile, chef-kds]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run real-time tests
        working-directory: qrdine
        run: npx playwright test --project=realtime-tests --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-realtime
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 10 — UI Quality Agent Pipeline (push to main only)
  # ════════════════════════════════════════════════════════════════════════════
  ui-quality-audit:
    name: "UI Quality Audit (Design Agent)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [admin-ui, customer-mobile, chef-kds]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install qrdine dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install agent dependencies
        working-directory: agents
        run: npm install

      - name: Start app in background
        working-directory: qrdine
        run: pnpm dev &

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run screenshot + audit pipeline
        run: node agents/run-pipeline.js --level=1 && node agents/run-pipeline.js --level=2

      - name: Fail on CRITICAL design issues
        run: node agents/check-critical-failures.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-ui-quality-audit
          path: agents/output/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 11 — Final Gate
  # ════════════════════════════════════════════════════════════════════════════
  all-clear:
    name: "All Clear ✅"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - static-analysis
      - auth-tests
      - api-tests
      - security-tests
      - admin-ui
      - customer-mobile
      - chef-kds
      - edge-cases
      - design-compliance
      - realtime-tests
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.static-analysis.result }}"
            "${{ needs.auth-tests.result }}"
            "${{ needs.api-tests.result }}"
            "${{ needs.security-tests.result }}"
            "${{ needs.admin-ui.result }}"
            "${{ needs.customer-mobile.result }}"
            "${{ needs.chef-kds.result }}"
            "${{ needs.edge-cases.result }}"
            "${{ needs.design-compliance.result }}"
            "${{ needs.realtime-tests.result }}"
          )
          failed=0
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "❌ A required job failed: $result"
              failed=1
            fi
          done
          if [[ $failed -eq 1 ]]; then exit 1; fi
          echo "✅ All required jobs passed."
