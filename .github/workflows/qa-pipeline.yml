name: ScanBite QA Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  TEST_ADMIN_EMAIL: admin@spicegarden.com
  TEST_ADMIN_PASSWORD: admin123
  TEST_RESTAURANT_SLUG: spice-garden
  NODE_VERSION: "20"

# ─── Setup: node via actions/setup-node, pnpm via npm install -g ───────────────

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 0 — Static Analysis (TypeScript + ESLint)
  # ════════════════════════════════════════════════════════════════════════════
  static-analysis:
    name: "Static Analysis (TS + ESLint)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        working-directory: qrdine
        run: pnpm type-check

      - name: ESLint
        working-directory: qrdine
        run: pnpm lint

      # ── Security grep gates ──────────────────────────────────────────────
      # These are hard blockers: the build must never contain these patterns.

      - name: "Grep gate: no fallback secrets"
        working-directory: qrdine
        run: |
          # Fail if any lib/secret or auth file uses a fallback string literal
          # (e.g.  ?? "fallback"  or  ?? "dev-secret"). All secrets must fail-closed.
          if grep -rn --include="*.ts" --include="*.tsx" \
              -E '(\?\?|or)\s*["'"'"'][^"'"'"']*fallback[^"'"'"']*["'"'"']' \
              lib/ app/api/ 2>/dev/null | grep -v "node_modules"; then
            echo "ERROR: fallback secret found — secrets must fail-closed."
            exit 1
          fi
          echo "PASS: no fallback secrets."

      - name: "Grep gate: no 'as any' in app/api or lib"
        working-directory: qrdine
        run: |
          # 'as any' in API routes or lib bypasses type safety and may hide
          # tenant-isolation bugs. All was-any cases were removed in Wave 1.
          if grep -rn --include="*.ts" --include="*.tsx" \
              -E '\bas any\b' app/api/ lib/ 2>/dev/null | grep -v "node_modules"; then
            echo "ERROR: 'as any' found in app/api or lib — remove the cast."
            exit 1
          fi
          echo "PASS: no 'as any' in app/api or lib."

      - name: "Grep gate: restaurant_id never from request body/query/header"
        working-directory: qrdine
        run: |
          # restaurant_id MUST come only from the authenticated principal (JWT/session).
          # It must never be read from req.body, searchParams, headers, or query params.
          if grep -rn --include="*.ts" \
              -E 'searchParams\.get\(["\'"'"']restaurant_?id["\'"'"']\)|body\.(restaurant_?id|restaurantId)|headers\.get\(["\'"'"']restaurant' \
              app/api/ 2>/dev/null | grep -v "node_modules" | grep -v "verify-restaurant"; then
            echo "ERROR: restaurant_id read from untrusted source (body/query/header)."
            echo "       It must ONLY come from the authenticated session/JWT."
            exit 1
          fi
          echo "PASS: restaurant_id sourced only from principal."

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Auth Tests  (gates all browser jobs)
  # ════════════════════════════════════════════════════════════════════════════
  auth-tests:
    name: "Auth Tests (UI + API)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: static-analysis
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Seed test database
        run: node qrdine/scripts/ci-seed.mjs
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run auth tests
        working-directory: qrdine
        run: npx playwright test --project=auth-tests --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-auth
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — API Tests
  # ════════════════════════════════════════════════════════════════════════════
  api-tests:
    name: "API Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: auth-tests
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        working-directory: qrdine
        run: npx playwright test --project=api-tests --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-api
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Security Tests
  # ════════════════════════════════════════════════════════════════════════════
  security-tests:
    name: "Security Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: auth-tests
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run security tests
        working-directory: qrdine
        run: npx playwright test --project=security-tests --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-security
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — Admin UI Tests
  # ════════════════════════════════════════════════════════════════════════════
  admin-ui:
    name: "Admin UI (Desktop)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [api-tests, security-tests]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run admin UI tests
        working-directory: qrdine
        run: npx playwright test --project=admin-desktop --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-admin-ui
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5 — Customer Mobile Tests
  # ════════════════════════════════════════════════════════════════════════════
  customer-mobile:
    name: "Customer Mobile (Pixel 7)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [api-tests, security-tests]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run customer mobile tests
        working-directory: qrdine
        run: npx playwright test --project=customer-mobile --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-customer-mobile
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 6 — Chef / KDS Tests
  # ════════════════════════════════════════════════════════════════════════════
  chef-kds:
    name: "Chef / KDS (iPad Pro)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [api-tests, security-tests]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run chef / KDS tests
        working-directory: qrdine
        run: npx playwright test --project=chef-tablet --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-chef-kds
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 7 — Edge Cases
  # ════════════════════════════════════════════════════════════════════════════
  edge-cases:
    name: "Edge Cases & Regression"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [api-tests, security-tests]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run edge case tests
        working-directory: qrdine
        run: npx playwright test --project=edge-cases --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-edge-cases
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 8 — Design Compliance
  # ════════════════════════════════════════════════════════════════════════════
  design-compliance:
    name: "Design Compliance Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [admin-ui, customer-mobile]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run design compliance tests
        working-directory: qrdine
        run: npx playwright test --project=design-compliance --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-design-compliance
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 9 — Real-time Socket Tests
  # ════════════════════════════════════════════════════════════════════════════
  realtime-tests:
    name: "Real-time Socket Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [admin-ui, customer-mobile, chef-kds]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps

      - name: Run real-time tests
        working-directory: qrdine
        run: npx playwright test --project=realtime-tests --reporter=list,json,html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-realtime
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 9b — Unit Tests (pure, no server required)
  # ════════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: "Unit Tests (PIN / billing / order-number)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        run: npm install -g pnpm@10
      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile
      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps
      - name: Run unit tests
        working-directory: qrdine
        run: npx playwright test --project=unit-tests --reporter=list,json,html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-unit-tests
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 9c — Integration Tests (rate-limit / oversell / idempotency)
  # ════════════════════════════════════════════════════════════════════════════
  integration-tests:
    name: "Integration Tests (rate-limit / oversell / mark-paid)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: auth-tests
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        run: npm install -g pnpm@10
      - name: Install dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile
      - name: Install Playwright (Chromium)
        working-directory: qrdine
        run: npx playwright install chromium --with-deps
      - name: Run integration tests
        working-directory: qrdine
        run: npx playwright test --project=integration-tests --reporter=list,json,html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-integration
          path: qrdine/test-results/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 10 — UI Quality Agent Pipeline (push to main only)
  # ════════════════════════════════════════════════════════════════════════════
  ui-quality-audit:
    name: "UI Quality Audit (Design Agent)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [admin-ui, customer-mobile, chef-kds]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install qrdine dependencies
        working-directory: qrdine
        run: pnpm install --frozen-lockfile

      - name: Install agent dependencies
        working-directory: agents
        run: npm install

      - name: Start app in background
        working-directory: qrdine
        run: pnpm dev &

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run screenshot + audit pipeline
        run: node agents/run-pipeline.js --level=1 && node agents/run-pipeline.js --level=2

      - name: Fail on CRITICAL design issues
        run: node agents/check-critical-failures.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-ui-quality-audit
          path: agents/output/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 11 — Final Gate
  # ════════════════════════════════════════════════════════════════════════════
  all-clear:
    name: "All Clear"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - static-analysis
      - unit-tests
      - auth-tests
      - api-tests
      - security-tests
      - integration-tests
      - admin-ui
      - customer-mobile
      - chef-kds
      - edge-cases
      - design-compliance
      - realtime-tests
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.static-analysis.result }}"
            "${{ needs.unit-tests.result }}"
            "${{ needs.auth-tests.result }}"
            "${{ needs.api-tests.result }}"
            "${{ needs.security-tests.result }}"
            "${{ needs.integration-tests.result }}"
            "${{ needs.admin-ui.result }}"
            "${{ needs.customer-mobile.result }}"
            "${{ needs.chef-kds.result }}"
            "${{ needs.edge-cases.result }}"
            "${{ needs.design-compliance.result }}"
            "${{ needs.realtime-tests.result }}"
          )
          failed=0
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "FAIL: A required job did not succeed: $result"
              failed=1
            fi
          done
          if [[ $failed -eq 1 ]]; then exit 1; fi
          echo "PASS: All required jobs passed."
